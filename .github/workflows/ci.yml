name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Typecheck plugins
        run: bun --filter './plugins/*' typecheck

      - name: Test
        run: bun test

      - name: Build all plugins (smoke)
        run: bun run scripts/build-plugin.ts

      - name: Pack all plugins (smoke)
        run: bun run scripts/pack-plugin.ts
