name: release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Detect changed plugins
        id: changed
        run: bun run scripts/changed-plugins.ts

      - name: Build changed plugins
        if: steps.changed.outputs.count != '0'
        env:
          PLUGINS: ${{ steps.changed.outputs.plugins }}
        run: |
          IFS=',' read -ra slugs <<< "$PLUGINS"
          bun run scripts/build-plugin.ts "${slugs[@]}"

      - name: Pack changed plugins
        if: steps.changed.outputs.count != '0'
        env:
          PLUGINS: ${{ steps.changed.outputs.plugins }}
        run: |
          IFS=',' read -ra slugs <<< "$PLUGINS"
          bun run scripts/pack-plugin.ts "${slugs[@]}"

      - name: Configure git
        if: steps.changed.outputs.count != '0'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Tag and release
        if: steps.changed.outputs.count != '0'
        env:
          PLUGINS: ${{ steps.changed.outputs.plugins }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          IFS=',' read -ra slugs <<< "$PLUGINS"
          bun run scripts/release-plugin.ts "${slugs[@]}"

      - name: Upload tarballs as workflow artifacts
        if: steps.changed.outputs.count != '0'
        uses: actions/upload-artifact@v7
        with:
          name: tarballs
          path: dist/aviato-plugin-*.tar.gz*
          retention-days: 30
